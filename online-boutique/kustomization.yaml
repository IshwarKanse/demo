apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/main/release/kubernetes-manifests.yaml

  # Remove hardcoded securityContext (runAsUser: 1000, fsGroup: 1000) from all
  # deployments so OpenShift can assign UIDs from the namespace range.
patches:
  - target:
      kind: Deployment
    patch: |-
      - op: remove
        path: /spec/template/spec/securityContext
      - op: remove
        path: /spec/template/spec/containers/0/securityContext
  # checkoutservice
  - target:
      kind: Deployment
      name: checkoutservice
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: checkoutservice
      spec:
        template:
          spec:
            containers:
              - name: server
                env:
                  - name: COLLECTOR_SERVICE_ADDR
                    value: "tracing-system-collector.openshift-cluster-observability-operator.svc.cluster.local:4317"
                  - name: OTEL_SERVICE_NAME
                    value: "checkoutservice"
                  - name: ENABLE_TRACING
                    value: "1"

